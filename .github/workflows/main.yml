name: Build rr_statusmask

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools (i386)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            g++-multilib \
            gcc-multilib \
            cmake \
            curl \
            unzip \
            make \
            file

      - name: Fix Windows line endings in shell scripts
        run: |
          sed -i 's/\r$//' fetch_deps.sh compile.sh
          chmod +x fetch_deps.sh compile.sh

      - name: Build .so
        run: |
          set -eux
          bash ./fetch_deps.sh
          bash ./compile.sh
          test -f build/rr_statusmask_mm_i386.so
          ls -la build/rr_statusmask_mm_i386.so
          file build/rr_statusmask_mm_i386.so
          echo "=== Meta exports ==="
          nm -D build/rr_statusmask_mm_i386.so | grep -E 'Meta_|GiveFnptrsToDll'
          nm -D build/rr_statusmask_mm_i386.so | grep ' Meta_Query$'
          echo "=== GLIBC versions (must be <= 2.31 for old HLDS docker) ==="
          strings build/rr_statusmask_mm_i386.so | grep 'GLIBC_' | sort -Vu
          if strings build/rr_statusmask_mm_i386.so | grep -q 'GLIBC_2.3[4-9]'; then
            echo "ERROR: .so requires GLIBC >= 2.34 — too new for many CS 1.6 servers"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rr_statusmask_mm_i386
          path: build/rr_statusmask_mm_i386.so
          if-no-files-found: error
